services:

  php:
    build: ./docker/php
    container_name: pizzaflow_php
    volumes:
      - ./app:/var/www
    depends_on:
      - db
    networks:
      - pizzanet

  nginx:
    image: nginx:latest
    container_name: pizzaflow_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - pizzanet

  db:
    image: postgres:15
    container_name: pizzaflow_db
    environment:
      POSTGRES_DB: pizzaflow
      POSTGRES_USER: pizza
      POSTGRES_PASSWORD: pizza
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pizzanet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizza -d pizzaflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  cron:
    build:
      context: .
      dockerfile: docker/cron/Dockerfile
    container_name: pizzaflow_cron
    volumes:
      - ./app:/var/www
    depends_on:
      - db
    networks:
      - pizzanet

volumes:
  postgres_data:

networks:
  pizzanet: